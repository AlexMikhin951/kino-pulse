<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КИНО ПУЛЬС</title>
    <!-- Подключаем премиальные шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0b0d14;
            --accent: #00f2fe;
            --accent-alt: #4facfe;
            --glass-bg: rgba(20, 24, 36, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 30%, rgba(79, 172, 254, 0.1), transparent 30%),
                radial-gradient(circle at 85% 70%, rgba(0, 242, 254, 0.1), transparent 30%);
            background-attachment: fixed;
            color: #e2e8f0;
            min-height: 100vh;
        }
        h1, h2, h3, h4, h5, .navbar-brand { font-family: 'Montserrat', sans-serif; }
        
        .navbar {
            background: rgba(11, 13, 20, 0.85) !important;
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
        }
        .navbar-brand { color: #fff !important; font-weight: 800; letter-spacing: 1px; }
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }
        
        /* Стили для формы авторизации (яркие) */
        .form-control-glass {
            background: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid rgba(0, 242, 254, 0.3) !important;
            color: #ffffff !important; 
            font-family: 'Inter', sans-serif;
        }
        .form-control-glass::placeholder {
            color: rgba(255, 255, 255, 0.6) !important;
        }
        .form-control-glass:focus {
            background: rgba(0,0,0,0.7) !important;
            border-color: var(--accent) !important;
            color: #fff !important;
            box-shadow: 0 0 15px rgba(0,242,254,0.3);
        }
        
        .btn-gradient {
            background: linear-gradient(90deg, var(--accent-alt), var(--accent));
            border: none; color: #000; font-weight: 600;
        }
        .btn-gradient:hover { box-shadow: 0 0 20px rgba(0,242,254,0.4); color: #000; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top mb-5 p-3">
        <div class="container">
            <a class="navbar-brand fs-4" href="/"><i class="fa-solid fa-play text-info me-2"></i>КИНО ПУЛЬС</a>
            <div class="d-flex ms-auto align-items-center">
                {% if user %}
                    <span class="me-3 fw-bold text-light">{{ user.username }}</span>
                    <a href="/logout" class="btn btn-sm btn-outline-danger rounded-pill px-3">Выйти</a>
                {% else %}
                    <form class="d-flex gap-2" method="post">
                        <input type="text" name="username" class="form-control form-control-sm form-control-glass rounded-pill px-3" placeholder="Логин" required>
                        <input type="password" name="password" class="form-control form-control-sm form-control-glass rounded-pill px-3" placeholder="Пароль" required>
                        <button type="submit" formaction="/login" class="btn btn-sm btn-gradient rounded-pill px-4">Вход</button>
                        <button type="submit" formaction="/register" class="btn btn-sm btn-outline-light rounded-pill px-3">Регистрация</button>
                    </form>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container pb-5">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
